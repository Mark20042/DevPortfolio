<!doctype html>
<html lang="en" class="h-full">
	<head>
		<meta charset="utf-8" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
			integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%

		<style>
			#preloader {
				position: fixed;

				background-color: #1e1e1e;

				inset: 0;
				z-index: 9999;

				display: flex;
				justify-content: center;
				align-items: center;

				transition: opacity 0.5s ease-out;
			}

			#preloader.hidden {
				opacity: 0;

				pointer-events: none;
			}

			.typewriter-container {
				font-family: 'Poppins', sans-serif;
				font-size: 1.5rem;
				color: #ff3e00;
				text-align: left;
				max-width: 90%;
				font-weight: 500;

				min-height: 3em;
			}

			.cursor {
				display: inline-block;
				width: 3px;
				height: 1.5rem;
				background-color: #ff3e00;
				margin-left: 8px;
				animation: blink 0.8s infinite;
			}

			@keyframes blink {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0;
				}
			}

			@media (min-width: 768px) {
				.typewriter-container {
					font-size: 2.5rem;
				}
				.cursor {
					height: 2.5rem;
				}
			}
		</style>
	</head>

	<body data-sveltekit-preload-data="hover" class="relative">
		<div id="preloader">
			<div class="typewriter-container">
				<span id="typewriter-text"></span>
				<span class="cursor"></span>
			</div>
		</div>

		<div style="display: contents" class="relative z-1">%sveltekit.body%</div>

		<div class="theme-background"></div>

		<script>
			document.addEventListener('DOMContentLoaded', function () {
				(function () {
					const lines = ['Hey!', 'Azore Dev </> '];
					const textElement = document.getElementById('typewriter-text');
					const preloader = document.getElementById('preloader');

					const typingSpeed = 110; // Time (ms) between each character
					const erasingSpeed = 30; // Time (ms) to erase each character
					const linePause = 1090; // Time (ms) to pause after typing a line
					const finalPause = 1000; // Time (ms) to pause after the *last* line

					let lineIndex = 0;
					let charIndex = 0;

					function type() {
						const currentLine = lines[lineIndex];
						// Use textContent for safety
						textElement.textContent = currentLine.substring(0, charIndex);
						charIndex++;

						if (charIndex <= currentLine.length) {
							// Keep typing
							setTimeout(type, typingSpeed);
						} else {
							// Finished typing this line
							if (lineIndex === lines.length - 1) {
								// This is the LAST line, so we don't erase
								setTimeout(hidePreloader, finalPause);
							} else {
								// Not the last line, pause then erase
								setTimeout(erase, linePause);
							}
						}
					}

					function erase() {
						const currentLine = lines[lineIndex];
						textElement.textContent = currentLine.substring(0, charIndex);
						charIndex--;

						if (charIndex >= 0) {
							setTimeout(erase, erasingSpeed);
						} else {
							lineIndex++;
							setTimeout(type, typingSpeed);
						}
					}

					function hidePreloader() {
						document.dispatchEvent(new CustomEvent('preloaderFinished'));
						preloader.classList.add('hidden');

						setTimeout(() => {
							preloader.style.display = 'none';
						}, 500);
					}

					type();
				})();
			});
		</script>
	</body>
</html>
